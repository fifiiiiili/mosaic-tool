<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOSAIC Gallery - 马赛克效果展示</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --c-bg: #0a0a0f;
      --c-surface: #1a1a25;
      --c-border: #2a2a3a;
      --c-text: #ffffff;
      --c-text-secondary: #a0a0b0;
      --c-accent: #667eea;
      --c-accent-light: #8b9cff;
      --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-accent: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    body {
      font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* 头部 */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 24px 48px;
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--c-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }

    .nav-links a {
      color: var(--c-text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: var(--c-text);
    }

    /* 英雄区 */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 24px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(102, 126, 234, 0.15) 0%, transparent 70%);
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
    }

    .hero-title {
      font-size: clamp(48px, 10vw, 120px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .hero-title span {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2vw, 24px);
      color: var(--c-text-secondary);
      font-weight: 400;
      max-width: 600px;
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    .scroll-hint {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: var(--c-text-secondary);
      font-size: 12px;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(10px); }
    }

    .scroll-hint svg {
      width: 24px;
      height: 24px;
    }

    /* 螺旋画廊 */
    .gallery-section {
      padding: 120px 0;
      position: relative;
    }

    .section-title {
      text-align: center;
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 80px;
      letter-spacing: -0.02em;
    }

    .spiral-container {
      position: relative;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      height: 800px;
      perspective: 1200px;
    }

    .spiral-track {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-style: preserve-3d;
      transform: translate(-50%, -50%) rotateX(15deg);
      width: 100%;
      height: 100%;
    }

    .film-card {
      position: absolute;
      width: 280px;
      height: 200px;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--c-border);
    }

    .film-card:hover {
      transform: scale(1.3) translateZ(100px);
      z-index: 100;
      box-shadow: 0 40px 100px rgba(102, 126, 234, 0.3);
      border-color: var(--c-accent);
    }

    .film-card canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .film-card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .film-card:hover .film-card-info {
      opacity: 1;
    }

    .film-card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .film-card-params {
      font-size: 11px;
      color: var(--c-text-secondary);
    }

    /* 详情弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }

    .modal-content {
      max-width: 900px;
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .modal-image {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
    }

    .modal-image canvas {
      width: 100%;
      height: auto;
      display: block;
    }

    .modal-details {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .modal-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal-description {
      color: var(--c-text-secondary);
      font-size: 16px;
      line-height: 1.6;
    }

    .modal-params {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--c-surface);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid var(--c-border);
    }

    .param-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }

    .param-label {
      color: var(--c-text-secondary);
      font-size: 14px;
    }

    .param-value {
      font-weight: 600;
      font-family: 'Space Grotesk', monospace;
      color: var(--c-accent-light);
    }

    .modal-close {
      position: absolute;
      top: 32px;
      right: 32px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      color: var(--c-text);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .modal-close:hover {
      background: var(--c-accent);
      border-color: var(--c-accent);
      transform: rotate(90deg);
    }

    /* 页脚 */
    .footer {
      padding: 48px;
      text-align: center;
      border-top: 1px solid var(--c-border);
      color: var(--c-text-secondary);
      font-size: 14px;
    }

    .footer a {
      color: var(--c-accent-light);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .header { padding: 16px 24px; }
      .nav-links { display: none; }
      .spiral-container { height: 600px; }
      .film-card { width: 200px; height: 140px; }
      .modal-details { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">MOSAIC</div>
    <nav class="nav-links">
      <a href="#gallery">效果展示</a>
      <a href="https://github.com/fifiiiiili/mosaic-tool" target="_blank">GitHub</a>
    </nav>
  </header>

  <section class="hero">
    <h1 class="hero-title"><span>MOSAIC</span></h1>
    <p class="hero-subtitle">探索马赛克艺术的无限可能。五种效果，无限组合，让隐私保护也能充满美感。</p>
    <div class="scroll-hint">
      <span>向下滚动</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
    </div>
  </section>

  <section class="gallery-section" id="gallery">
    <h2 class="section-title">效果画廊</h2>
    <div class="spiral-container">
      <div class="spiral-track" id="spiralTrack"></div>
    </div>
  </section>

  <div class="modal-overlay" id="modal">
    <button class="modal-close" id="modalClose">×</button>
    <div class="modal-content">
      <div class="modal-image">
        <canvas id="modalCanvas"></canvas>
      </div>
      <div class="modal-details">
        <div>
          <h3 class="modal-title" id="modalTitle"></h3>
          <p class="modal-description" id="modalDesc"></p>
        </div>
        <div class="modal-params" id="modalParams"></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>MOSAIC - 马赛克打码工具 | <a href="https://github.com/fifiiiiili/mosaic-tool" target="_blank">GitHub</a></p>
  </footer>

  <script>
    // 马赛克效果实现
    const MosaicEffects = {
      pixelate(source, w, h, intensity) {
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        const pixelSize = Math.max(2, Math.round(4 + intensity * 56));
        const scale = 1 / pixelSize;
        const smallW = Math.max(1, Math.round(w * scale));
        const smallH = Math.max(1, Math.round(h * scale));
        const smallCanvas = document.createElement('canvas');
        smallCanvas.width = smallW; smallCanvas.height = smallH;
        const smallCtx = smallCanvas.getContext('2d');
        smallCtx.imageSmoothingEnabled = true;
        smallCtx.drawImage(source, 0, 0, smallW, smallH);
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(smallCanvas, 0, 0, smallW, smallH, 0, 0, w, h);
        return canvas;
      },
      blur(source, w, h, intensity) {
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        const factor = Math.max(0.01, 1 - intensity * 0.98);
        const smallW = Math.max(1, Math.round(w * factor));
        const smallH = Math.max(1, Math.round(h * factor));
        const smallCanvas = document.createElement('canvas');
        smallCanvas.width = smallW; smallCanvas.height = smallH;
        const smallCtx = smallCanvas.getContext('2d');
        smallCtx.imageSmoothingEnabled = true;
        smallCtx.imageSmoothingQuality = 'high';
        smallCtx.drawImage(source, 0, 0, smallW, smallH);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(smallCanvas, 0, 0, smallW, smallH, 0, 0, w, h);
        return canvas;
      },
      frosted(source, w, h, intensity) {
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        const factor = Math.max(0.01, 1 - intensity * 0.95);
        const smallW = Math.max(1, Math.round(w * factor));
        const smallH = Math.max(1, Math.round(h * factor));
        const smallCanvas = document.createElement('canvas');
        smallCanvas.width = smallW; smallCanvas.height = smallH;
        const smallCtx = smallCanvas.getContext('2d');
        smallCtx.imageSmoothingEnabled = true;
        smallCtx.imageSmoothingQuality = 'high';
        smallCtx.drawImage(source, 0, 0, smallW, smallH);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(smallCanvas, 0, 0, smallW, smallH, 0, 0, w, h);
        const brightness = 1 + intensity * 0.35;
        const saturation = 1 - intensity * 0.5;
        const imgData = ctx.getImageData(0, 0, w, h);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
          let r = data[i], g = data[i + 1], b = data[i + 2];
          r = Math.min(255, r * brightness);
          g = Math.min(255, g * brightness);
          b = Math.min(255, b * brightness);
          const gray = 0.299 * r + 0.587 * g + 0.114 * b;
          r = gray + (r - gray) * saturation;
          g = gray + (g - gray) * saturation;
          b = gray + (b - gray) * saturation;
          data[i] = Math.round(Math.min(255, r));
          data[i + 1] = Math.round(Math.min(255, g));
          data[i + 2] = Math.round(Math.min(255, b));
        }
        ctx.putImageData(imgData, 0, 0);
        return canvas;
      },
      colorBlock(source, w, h, intensity) {
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        const blockSize = Math.max(4, Math.round(8 + intensity * 60));
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w; tempCanvas.height = h;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(source, 0, 0);
        const imgData = tempCtx.getImageData(0, 0, w, h);
        const data = imgData.data;
        for (let by = 0; by < h; by += blockSize) {
          for (let bx = 0; bx < w; bx += blockSize) {
            let r = 0, g = 0, b = 0, count = 0;
            const bw = Math.min(blockSize, w - bx);
            const bh = Math.min(blockSize, h - by);
            for (let py = by; py < by + bh; py++) {
              for (let px = bx; px < bx + bw; px++) {
                const idx = (py * w + px) * 4;
                r += data[idx]; g += data[idx + 1]; b += data[idx + 2]; count++;
              }
            }
            ctx.fillStyle = `rgb(${Math.round(r / count)},${Math.round(g / count)},${Math.round(b / count)})`;
            ctx.fillRect(bx, by, bw, bh);
          }
        }
        return canvas;
      },
      scatter(source, w, h, intensity) {
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        const blockSize = Math.max(3, Math.round(4 + intensity * 20));
        const scatterRange = Math.round(intensity * blockSize * 3);
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w; tempCanvas.height = h;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(source, 0, 0);
        const imgData = tempCtx.getImageData(0, 0, w, h);
        for (let by = 0; by < h; by += blockSize) {
          for (let bx = 0; bx < w; bx += blockSize) {
            const bw = Math.min(blockSize, w - bx);
            const bh = Math.min(blockSize, h - by);
            const dx = Math.round((Math.random() - 0.5) * scatterRange);
            const dy = Math.round((Math.random() - 0.5) * scatterRange);
            const blockData = new ImageData(bw, bh);
            for (let py = 0; py < bh; py++) {
              for (let px = 0; px < bw; px++) {
                const srcIdx = ((by + py) * w + (bx + px)) * 4;
                const dstIdx = (py * bw + px) * 4;
                blockData.data[dstIdx] = imgData.data[srcIdx];
                blockData.data[dstIdx + 1] = imgData.data[srcIdx + 1];
                blockData.data[dstIdx + 2] = imgData.data[srcIdx + 2];
                blockData.data[dstIdx + 3] = imgData.data[srcIdx + 3];
              }
            }
            const blockCanvas = document.createElement('canvas');
            blockCanvas.width = bw; blockCanvas.height = bh;
            const blockCtx = blockCanvas.getContext('2d');
            blockCtx.putImageData(blockData, 0, 0);
            ctx.drawImage(blockCanvas, bx + dx, by + dy);
          }
        }
        return canvas;
      }
    };

    // 效果配置
    const effects = [
      { type: 'pixelate', name: '像素化', desc: '经典马赛克效果，将图像分割成像素方块', intensity: 0.7 },
      { type: 'pixelate', name: '像素化', desc: '轻度像素化，保留更多细节', intensity: 0.3 },
      { type: 'pixelate', name: '像素化', desc: '重度像素化，完全模糊细节', intensity: 0.9 },
      { type: 'blur', name: '高斯模糊', desc: '柔和的模糊效果，自然过渡', intensity: 0.6 },
      { type: 'blur', name: '高斯模糊', desc: '轻度模糊，保持可辨识', intensity: 0.3 },
      { type: 'blur', name: '高斯模糊', desc: '强烈模糊，完全隐藏', intensity: 0.9 },
      { type: 'frosted', name: '毛玻璃', desc: '模糊加提亮，类似毛玻璃效果', intensity: 0.5 },
      { type: 'frosted', name: '毛玻璃', desc: '柔和毛玻璃，半透明质感', intensity: 0.3 },
      { type: 'frosted', name: '毛玻璃', desc: '强烈毛玻璃，高度模糊', intensity: 0.8 },
      { type: 'colorBlock', name: '色块填充', desc: '将区域填充为平均色块', intensity: 0.6 },
      { type: 'colorBlock', name: '色块填充', desc: '大色块，抽象艺术感', intensity: 0.9 },
      { type: 'scatter', name: '散射', desc: '随机打散像素块', intensity: 0.5 },
      { type: 'scatter', name: '散射', desc: '强烈散射，完全打乱', intensity: 0.8 },
    ];

    // 创建示例图片
    function createSampleImage() {
      const canvas = document.createElement('canvas');
      canvas.width = 400;
      canvas.height = 300;
      const ctx = canvas.getContext('2d');
      
      // 渐变背景
      const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradient.addColorStop(0, '#667eea');
      gradient.addColorStop(0.5, '#764ba2');
      gradient.addColorStop(1, '#f093fb');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // 添加一些图形
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.beginPath();
      ctx.arc(100, 100, 60, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
      ctx.beginPath();
      ctx.arc(300, 200, 80, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.fillRect(150, 50, 100, 200);
      
      return canvas;
    }

    // 初始化螺旋画廊
    function initSpiralGallery() {
      const track = document.getElementById('spiralTrack');
      const sampleImage = createSampleImage();
      
      effects.forEach((effect, index) => {
        const card = document.createElement('div');
        card.className = 'film-card';
        
        // 计算螺旋位置
        const total = effects.length;
        const angle = (index / total) * Math.PI * 4; // 2圈螺旋
        const radius = 200 + index * 25;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius * 0.3 + (index - total / 2) * 30;
        const z = -index * 50;
        const rotateY = angle * (180 / Math.PI);
        
        card.style.transform = `translate(${x}px, ${y}px) translateZ(${z}px) rotateY(${rotateY}deg)`;
        
        // 创建效果画布
        const effectCanvas = MosaicEffects[effect.type](sampleImage, 400, 300, effect.intensity);
        card.appendChild(effectCanvas);
        
        // 信息面板
        const info = document.createElement('div');
        info.className = 'film-card-info';
        info.innerHTML = `
          <div class="film-card-title">${effect.name}</div>
          <div class="film-card-params">强度: ${Math.round(effect.intensity * 100)}%</div>
        `;
        card.appendChild(info);
        
        // 点击事件
        card.addEventListener('click', () => openModal(effect, effectCanvas));
        
        track.appendChild(card);
      });
    }

    // 弹窗
    function openModal(effect, sourceCanvas) {
      const modal = document.getElementById('modal');
      const modalCanvas = document.getElementById('modalCanvas');
      const modalTitle = document.getElementById('modalTitle');
      const modalDesc = document.getElementById('modalDesc');
      const modalParams = document.getElementById('modalParams');
      
      // 复制画布内容
      modalCanvas.width = sourceCanvas.width;
      modalCanvas.height = sourceCanvas.height;
      modalCanvas.getContext('2d').drawImage(sourceCanvas, 0, 0);
      
      modalTitle.textContent = effect.name;
      modalDesc.textContent = effect.desc;
      
      modalParams.innerHTML = `
        <div class="param-item">
          <span class="param-label">效果类型</span>
          <span class="param-value">${effect.type}</span>
        </div>
        <div class="param-item">
          <span class="param-label">效果强度</span>
          <span class="param-value">${Math.round(effect.intensity * 100)}%</span>
        </div>
        <div class="param-item">
          <span class="param-label">画笔大小</span>
          <span class="param-value">40px</span>
        </div>
        <div class="param-item">
          <span class="param-label">硬度</span>
          <span class="param-value">80%</span>
        </div>
        <div class="param-item">
          <span class="param-label">透明度</span>
          <span class="param-value">100%</span>
        </div>
      `;
      
      modal.classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    // 事件绑定
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    // 初始化
    initSpiralGallery();
  </script>
</body>
</html>
