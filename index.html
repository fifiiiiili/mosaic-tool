<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOSAIC - 马赛克工具</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap');

    :root {
      --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-accent: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --c-primary: #667eea;
      --c-primary-dark: #5a67d8;
      --c-primary-light: #e0e7ff;
      --c-accent: #f5576c;
      --c-accent-hover: #f43f5e;
      --c-bg: #f8f9ff;
      --c-surface: #ffffff;
      --c-border: #e2e8f0;
      --c-border-light: #f1f5f9;
      --c-text: #1e293b;
      --c-text-secondary: #64748b;
      --c-text-muted: #94a3b8;
      --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--c-bg);
      color: var(--c-text);
      overflow: hidden;
      height: 100vh;
    }

    .mosaic-app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 64px;
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      box-shadow: var(--shadow-sm);
      z-index: 100;
    }

    .toolbar-left { display: flex; align-items: center; gap: 16px; }

    .app-title {
      font-size: 22px;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .toolbar-center { flex: 1; display: flex; justify-content: center; padding: 0 24px; }

    .toolbar-right { display: flex; gap: 12px; align-items: center; }

    .mosaic-types {
      display: flex;
      gap: 8px;
      background: var(--c-bg);
      padding: 6px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--c-border-light);
    }

    .type-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius);
      background: transparent;
      color: var(--c-text-secondary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      font-family: var(--font-sans);
    }

    .type-btn:hover { background: var(--c-surface); color: var(--c-primary); transform: translateY(-1px); }
    .type-btn.active { background: var(--c-surface); color: var(--c-primary); box-shadow: var(--shadow); font-weight: 600; }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      background: var(--c-surface);
      color: var(--c-text);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      white-space: nowrap;
      font-family: var(--font-sans);
    }

    .action-btn:hover:not(:disabled) {
      background: var(--c-primary-light);
      border-color: var(--c-primary);
      color: var(--c-primary);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .action-btn.primary {
      background: var(--gradient-primary);
      border: none;
      color: #fff;
      box-shadow: var(--shadow);
    }

    .action-btn.primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

    .action-btn.danger { color: var(--c-accent); border-color: var(--c-border); }
    .action-btn.danger:hover:not(:disabled) { background: var(--c-accent); color: #fff; border-color: var(--c-accent); }

    .main-area { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 64px); }

    .settings-panel {
      width: 280px;
      padding: 24px;
      background: var(--c-surface);
      border-right: 1px solid var(--c-border);
      display: flex;
      flex-direction: column;
      gap: 24px;
      flex-shrink: 0;
      overflow-y: auto;
      box-shadow: var(--shadow-sm);
    }

    .panel-header {
      font-size: 13px;
      font-weight: 700;
      color: var(--c-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      background: var(--c-bg);
      border-radius: var(--radius);
      border: 1px solid var(--c-border-light);
    }

    .setting-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--c-text);
    }

    .setting-value {
      font-size: 13px;
      color: var(--c-primary);
      font-weight: 700;
      font-family: var(--font-mono);
      background: var(--c-primary-light);
      padding: 4px 10px;
      border-radius: 6px;
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--c-border);
      outline: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider:hover { background: #cbd5e1; }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--c-surface);
      border: 3px solid var(--c-primary);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .slider::-webkit-slider-thumb:hover { transform: scale(1.15); box-shadow: var(--shadow-lg); }

    .brush-preview-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      background: var(--c-bg);
      border-radius: var(--radius);
      border: 1px solid var(--c-border-light);
    }

    .brush-preview-label {
      font-size: 12px;
      color: var(--c-text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .brush-preview-box {
      width: 100%;
      height: 100px;
      background: var(--c-surface);
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .brush-preview-circle {
      border-radius: 50%;
      background: var(--gradient-primary);
      transition: all 0.2s ease;
    }

    .canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      overflow: auto;
      position: relative;
      background: 
        radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(245, 87, 108, 0.03) 0%, transparent 50%),
        var(--c-bg);
    }

    .display-canvas {
      max-width: 100%;
      max-height: 100%;
      border-radius: var(--radius);
      box-shadow: var(--shadow-xl);
      touch-action: none;
    }

    .brush-cursor {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      border: 2px solid var(--c-primary);
      background: rgba(102, 126, 234, 0.1);
      transform: translate(-50%, -50%);
      z-index: 1000;
      transition: width 0.1s, height 0.1s;
    }

    .upload-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 520px;
      max-width: 90%;
      height: 360px;
      border: 2px dashed var(--c-border);
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--c-surface);
      position: relative;
      overflow: hidden;
    }

    .upload-zone::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--gradient-primary);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .upload-zone:hover { border-color: var(--c-primary); transform: translateY(-4px); box-shadow: var(--shadow-xl); }
    .upload-zone:hover::before { opacity: 0.05; }

    .upload-text { font-size: 20px; font-weight: 600; margin: 0 0 12px; color: var(--c-text); position: relative; z-index: 1; }
    .upload-hint { font-size: 14px; color: var(--c-text-muted); margin: 0; position: relative; z-index: 1; }

    @media (max-width: 768px) {
      .toolbar { flex-wrap: wrap; padding: 0 16px; height: auto; min-height: 64px; padding-top: 12px; padding-bottom: 12px; }
      .toolbar-center { order: 3; flex-basis: 100%; justify-content: flex-start; padding: 12px 0 0 0; }
      .mosaic-types { overflow-x: auto; }
      .type-btn { padding: 8px 14px; font-size: 13px; }
      .settings-panel { width: 240px; padding: 20px; }
      .action-btn { padding: 8px 14px; font-size: 13px; }
    }

    @media (max-width: 480px) {
      .settings-panel { width: 100%; flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--c-border); gap: 16px; padding: 16px; }
      .main-area { flex-direction: column; }
      .setting-group, .brush-preview-section { flex: 1; min-width: 140px; }
    }
  </style>
</head>
<body>
  <div class="mosaic-app">
    <header class="toolbar">
      <div class="toolbar-left">
        <h1 class="app-title">MOSAIC</h1>
        <a href="gallery.html" class="action-btn" style="text-decoration: none;">画廊</a>
      </div>
      <div class="toolbar-center">
        <div class="mosaic-types">
          <button class="type-btn active" data-type="pixelate">像素化</button>
          <button class="type-btn" data-type="blur">高斯模糊</button>
          <button class="type-btn" data-type="frosted">毛玻璃</button>
          <button class="type-btn" data-type="colorBlock">色块填充</button>
          <button class="type-btn" data-type="scatter">散射</button>
        </div>
      </div>
      <div class="toolbar-right">
        <button class="action-btn" id="btn-undo" disabled>↩ 撤销</button>
        <button class="action-btn" id="btn-redo" disabled>↪ 恢复</button>
        <button class="action-btn danger" id="btn-clear"> 清除</button>
        <button class="action-btn" id="btn-close">✕ 关闭</button>
        <button class="action-btn primary" id="btn-export">↓ 导出</button>
      </div>
    </header>

    <div class="main-area">
      <aside class="settings-panel" id="settings-panel" style="display: none;">
        <div class="panel-header">效果设置</div>
        <div class="setting-group">
          <label class="setting-label">
            <span>效果强度</span>
            <span class="setting-value" id="intensity-value">70%</span>
          </label>
          <input type="range" id="intensity" min="0" max="1" step="0.01" value="0.7" class="slider">
        </div>

        <div class="panel-header">画笔设置</div>
        <div class="setting-group">
          <label class="setting-label">
            <span>画笔大小</span>
            <span class="setting-value" id="brush-size-value">40px</span>
          </label>
          <input type="range" id="brush-size" min="5" max="200" step="1" value="40" class="slider">
        </div>

        <div class="setting-group">
          <label class="setting-label">
            <span>硬度</span>
            <span class="setting-value" id="hardness-value">80%</span>
          </label>
          <input type="range" id="hardness" min="0" max="1" step="0.01" value="0.8" class="slider">
        </div>

        <div class="setting-group">
          <label class="setting-label">
            <span>透明度</span>
            <span class="setting-value" id="opacity-value">100%</span>
          </label>
          <input type="range" id="opacity" min="0.05" max="1" step="0.01" value="1" class="slider">
        </div>

        <div class="brush-preview-section">
          <div class="brush-preview-label">画笔预览</div>
          <div class="brush-preview-box">
            <div class="brush-preview-circle" id="brush-preview"></div>
          </div>
        </div>
      </aside>

      <div class="canvas-container" id="canvas-container">
        <div class="upload-zone" id="upload-zone">
          <p class="upload-text">点击或拖拽上传图片</p>
          <p class="upload-hint">支持 JPG / PNG / WebP</p>
          <input type="file" id="file-input" accept="image/*" style="display: none;">
        </div>
        <canvas id="display-canvas" class="display-canvas" style="display: none;"></canvas>
      </div>
    </div>

    <div class="brush-cursor" id="brush-cursor" style="display: none;"></div>
  </div>

  <script>
    // 马赛克效果实现
    const MosaicEffects = {
      pixelate(source, w, h, intensity) {
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        const pixelSize = Math.max(2, Math.round(4 + intensity * 56));
        const scale = 1 / pixelSize;
        const smallW = Math.max(1, Math.round(w * scale));
        const smallH = Math.max(1, Math.round(h * scale));
        const smallCanvas = document.createElement('canvas');
        smallCanvas.width = smallW; smallCanvas.height = smallH;
        const smallCtx = smallCanvas.getContext('2d');
        smallCtx.imageSmoothingEnabled = true;
        smallCtx.drawImage(source, 0, 0, smallW, smallH);
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(smallCanvas, 0, 0, smallW, smallH, 0, 0, w, h);
        ctx.imageSmoothingEnabled = true;
        return canvas;
      },
      blur(source, w, h, intensity) {
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        const factor = Math.max(0.01, 1 - intensity * 0.98);
        const smallW = Math.max(1, Math.round(w * factor));
        const smallH = Math.max(1, Math.round(h * factor));
        const smallCanvas = document.createElement('canvas');
        smallCanvas.width = smallW; smallCanvas.height = smallH;
        const smallCtx = smallCanvas.getContext('2d');
        smallCtx.imageSmoothingEnabled = true;
        smallCtx.imageSmoothingQuality = 'high';
        smallCtx.drawImage(source, 0, 0, smallW, smallH);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(smallCanvas, 0, 0, smallW, smallH, 0, 0, w, h);
        return canvas;
      },
      frosted(source, w, h, intensity) {
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        const factor = Math.max(0.01, 1 - intensity * 0.95);
        const smallW = Math.max(1, Math.round(w * factor));
        const smallH = Math.max(1, Math.round(h * factor));
        const smallCanvas = document.createElement('canvas');
        smallCanvas.width = smallW; smallCanvas.height = smallH;
        const smallCtx = smallCanvas.getContext('2d');
        smallCtx.imageSmoothingEnabled = true;
        smallCtx.imageSmoothingQuality = 'high';
        smallCtx.drawImage(source, 0, 0, smallW, smallH);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(smallCanvas, 0, 0, smallW, smallH, 0, 0, w, h);
        const brightness = 1 + intensity * 0.35;
        const saturation = 1 - intensity * 0.5;
        const imgData = ctx.getImageData(0, 0, w, h);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
          let r = data[i], g = data[i + 1], b = data[i + 2];
          r = Math.min(255, r * brightness);
          g = Math.min(255, g * brightness);
          b = Math.min(255, b * brightness);
          const gray = 0.299 * r + 0.587 * g + 0.114 * b;
          r = gray + (r - gray) * saturation;
          g = gray + (g - gray) * saturation;
          b = gray + (b - gray) * saturation;
          data[i] = Math.round(Math.min(255, r));
          data[i + 1] = Math.round(Math.min(255, g));
          data[i + 2] = Math.round(Math.min(255, b));
        }
        ctx.putImageData(imgData, 0, 0);
        return canvas;
      },
      colorBlock(source, w, h, intensity) {
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        const blockSize = Math.max(4, Math.round(8 + intensity * 60));
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w; tempCanvas.height = h;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(source, 0, 0);
        const imgData = tempCtx.getImageData(0, 0, w, h);
        const data = imgData.data;
        for (let by = 0; by < h; by += blockSize) {
          for (let bx = 0; bx < w; bx += blockSize) {
            let r = 0, g = 0, b = 0, count = 0;
            const bw = Math.min(blockSize, w - bx);
            const bh = Math.min(blockSize, h - by);
            for (let py = by; py < by + bh; py++) {
              for (let px = bx; px < bx + bw; px++) {
                const idx = (py * w + px) * 4;
                r += data[idx]; g += data[idx + 1]; b += data[idx + 2]; count++;
              }
            }
            ctx.fillStyle = `rgb(${Math.round(r / count)},${Math.round(g / count)},${Math.round(b / count)})`;
            ctx.fillRect(bx, by, bw, bh);
          }
        }
        return canvas;
      },
      scatter(source, w, h, intensity) {
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        const blockSize = Math.max(3, Math.round(4 + intensity * 20));
        const scatterRange = Math.round(intensity * blockSize * 3);
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w; tempCanvas.height = h;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(source, 0, 0);
        const imgData = tempCtx.getImageData(0, 0, w, h);
        for (let by = 0; by < h; by += blockSize) {
          for (let bx = 0; bx < w; bx += blockSize) {
            const bw = Math.min(blockSize, w - bx);
            const bh = Math.min(blockSize, h - by);
            const dx = Math.round((Math.random() - 0.5) * scatterRange);
            const dy = Math.round((Math.random() - 0.5) * scatterRange);
            const blockData = new ImageData(bw, bh);
            for (let py = 0; py < bh; py++) {
              for (let px = 0; px < bw; px++) {
                const srcIdx = ((by + py) * w + (bx + px)) * 4;
                const dstIdx = (py * bw + px) * 4;
                blockData.data[dstIdx] = imgData.data[srcIdx];
                blockData.data[dstIdx + 1] = imgData.data[srcIdx + 1];
                blockData.data[dstIdx + 2] = imgData.data[srcIdx + 2];
                blockData.data[dstIdx + 3] = imgData.data[srcIdx + 3];
              }
            }
            const blockCanvas = document.createElement('canvas');
            blockCanvas.width = bw; blockCanvas.height = bh;
            const blockCtx = blockCanvas.getContext('2d');
            blockCtx.putImageData(blockData, 0, 0);
            ctx.drawImage(blockCanvas, bx + dx, by + dy);
          }
        }
        return canvas;
      }
    };

    function applyMosaicEffect(source, w, h, type, intensity) {
      return MosaicEffects[type](source, w, h, intensity);
    }

    // 应用状态
    let imageLoaded = false;
    let imageName = '';
    let mosaicType = 'pixelate';
    let intensity = 0.7;
    let brushSize = 40;
    let hardness = 0.8;
    let opacity = 1;
    let isDrawing = false;
    let canUndo = false;
    let canRedo = false;

    // Canvas 引用
    const displayCanvas = document.getElementById('display-canvas');
    const originalCanvas = document.createElement('canvas');
    const processedCanvas = document.createElement('canvas');
    const maskCanvas = document.createElement('canvas');
    const tempCanvas = document.createElement('canvas');

    let canvasScale = 1;
    let lastPoint = null;
    let history = [];
    let historyIndex = -1;

    // DOM 元素
    const uploadZone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('file-input');
    const settingsPanel = document.getElementById('settings-panel');
    const brushCursor = document.getElementById('brush-cursor');
    const brushPreview = document.getElementById('brush-preview');

    // 渲染
    function render() {
      const ctx = displayCanvas.getContext('2d');
      ctx.clearRect(0, 0, displayCanvas.width, displayCanvas.height);
      ctx.drawImage(processedCanvas, 0, 0);
      updateCanvasScale();
    }

    function updateCanvasScale() {
      const rect = displayCanvas.getBoundingClientRect();
      canvasScale = rect.width / displayCanvas.width;
    }

    function compositeToProcessed() {
      const w = processedCanvas.width;
      const h = processedCanvas.height;
      const tempCtx = tempCanvas.getContext('2d');
      const processedCtx = processedCanvas.getContext('2d');

      const effectResult = applyMosaicEffect(originalCanvas, w, h, mosaicType, intensity);

      tempCtx.clearRect(0, 0, w, h);
      tempCtx.drawImage(effectResult, 0, 0);
      tempCtx.globalCompositeOperation = 'destination-in';
      tempCtx.drawImage(maskCanvas, 0, 0);
      tempCtx.globalCompositeOperation = 'source-over';

      processedCtx.drawImage(tempCanvas, 0, 0);
    }

    function drawCircleOnMask(x, y) {
      const maskCtx = maskCanvas.getContext('2d');
      const r = brushSize / 2;

      maskCtx.save();
      if (hardness >= 0.95) {
        maskCtx.globalAlpha = opacity;
        maskCtx.fillStyle = '#ffffff';
        maskCtx.beginPath();
        maskCtx.arc(x, y, r, 0, Math.PI * 2);
        maskCtx.fill();
      } else {
        const grad = maskCtx.createRadialGradient(x, y, 0, x, y, r);
        grad.addColorStop(0, `rgba(255,255,255,${opacity})`);
        grad.addColorStop(Math.min(hardness, 0.99), `rgba(255,255,255,${opacity})`);
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        maskCtx.fillStyle = grad;
        maskCtx.beginPath();
        maskCtx.arc(x, y, r, 0, Math.PI * 2);
        maskCtx.fill();
      }
      maskCtx.restore();
    }

    function drawStrokeOnMask(fromX, fromY, toX, toY) {
      const dx = toX - fromX;
      const dy = toY - fromY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const step = Math.max(1, brushSize * 0.2);
      const steps = Math.max(1, Math.ceil(dist / step));

      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const x = fromX + dx * t;
        const y = fromY + dy * t;
        drawCircleOnMask(x, y);
      }
    }

    function renderWithMask() {
      const w = displayCanvas.width;
      const h = displayCanvas.height;
      const ctx = displayCanvas.getContext('2d');
      const tempCtx = tempCanvas.getContext('2d');

      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(processedCanvas, 0, 0);

      const maskCtx = maskCanvas.getContext('2d');
      const maskData = maskCtx.getImageData(0, 0, w, h);
      let hasMask = false;
      for (let i = 3; i < maskData.data.length; i += 4) {
        if (maskData.data[i] > 0) { hasMask = true; break; }
      }
      if (!hasMask) return;

      const effectResult = applyMosaicEffect(originalCanvas, w, h, mosaicType, intensity);

      tempCtx.clearRect(0, 0, w, h);
      tempCtx.drawImage(effectResult, 0, 0);
      tempCtx.globalCompositeOperation = 'destination-in';
      tempCtx.drawImage(maskCanvas, 0, 0);
      tempCtx.globalCompositeOperation = 'source-over';

      ctx.drawImage(tempCanvas, 0, 0);
    }

    function loadImage(img, name) {
      const MAX_DIM = 2400;
      let w = img.naturalWidth;
      let h = img.naturalHeight;
      if (w > MAX_DIM || h > MAX_DIM) {
        const scale = MAX_DIM / Math.max(w, h);
        w = Math.round(w * scale);
        h = Math.round(h * scale);
      }

      originalCanvas.width = w; originalCanvas.height = h;
      originalCanvas.getContext('2d').drawImage(img, 0, 0, w, h);

      processedCanvas.width = w; processedCanvas.height = h;
      processedCanvas.getContext('2d').drawImage(img, 0, 0, w, h);

      maskCanvas.width = w; maskCanvas.height = h;
      tempCanvas.width = w; tempCanvas.height = h;

      displayCanvas.width = w; displayCanvas.height = h;

      history = [];
      historyIndex = -1;
      updateUndoRedoButtons();

      imageLoaded = true;
      imageName = name;
      lastPoint = null;

      uploadZone.style.display = 'none';
      displayCanvas.style.display = 'block';
      settingsPanel.style.display = 'flex';

      render();
      saveToHistory();
    }

    function saveToHistory() {
      const ctx = processedCanvas.getContext('2d');
      const imageData = ctx.getImageData(0, 0, processedCanvas.width, processedCanvas.height);

      history = history.slice(0, historyIndex + 1);
      history.push(imageData);
      historyIndex = history.length - 1;

      if (history.length > 30) {
        history.shift();
        historyIndex--;
      }

      updateUndoRedoButtons();
    }

    function restoreFromHistory(index) {
      const imageData = history[index];
      if (!imageData) return;

      const ctx = processedCanvas.getContext('2d');
      ctx.putImageData(imageData, 0, 0);
      historyIndex = index;

      updateUndoRedoButtons();
      render();
    }

    function updateUndoRedoButtons() {
      canUndo = historyIndex > 0;
      canRedo = historyIndex < history.length - 1;
      document.getElementById('btn-undo').disabled = !canUndo;
      document.getElementById('btn-redo').disabled = !canRedo;
    }

    function getCanvasPos(e) {
      const rect = displayCanvas.getBoundingClientRect();
      const scaleX = displayCanvas.width / rect.width;
      const scaleY = displayCanvas.height / rect.height;
      const displayScale = rect.width / displayCanvas.width;

      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }

      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY,
        displayScale,
        clientX,
        clientY
      };
    }

    function handlePointerDown(e) {
      if (!imageLoaded) return;
      e.preventDefault();
      isDrawing = true;

      const pos = getCanvasPos(e);
      if (!pos) return;

      maskCanvas.getContext('2d').clearRect(0, 0, maskCanvas.width, maskCanvas.height);
      drawCircleOnMask(pos.x, pos.y);
      lastPoint = { x: pos.x, y: pos.y };

      brushCursor.style.display = 'block';
      brushCursor.style.left = pos.clientX + 'px';
      brushCursor.style.top = pos.clientY + 'px';
      brushCursor.style.width = (brushSize * pos.displayScale) + 'px';
      brushCursor.style.height = (brushSize * pos.displayScale) + 'px';

      renderWithMask();
    }

    function handlePointerMove(e) {
      if (!imageLoaded) return;
      e.preventDefault();

      const pos = getCanvasPos(e);
      if (!pos) return;

      brushCursor.style.display = 'block';
      brushCursor.style.left = pos.clientX + 'px';
      brushCursor.style.top = pos.clientY + 'px';
      brushCursor.style.width = (brushSize * pos.displayScale) + 'px';
      brushCursor.style.height = (brushSize * pos.displayScale) + 'px';

      if (!isDrawing) return;

      if (lastPoint) {
        drawStrokeOnMask(lastPoint.x, lastPoint.y, pos.x, pos.y);
      } else {
        drawCircleOnMask(pos.x, pos.y);
      }
      lastPoint = { x: pos.x, y: pos.y };
      renderWithMask();
    }

    function handlePointerUp() {
      if (isDrawing) {
        compositeToProcessed();
        maskCanvas.getContext('2d').clearRect(0, 0, maskCanvas.width, maskCanvas.height);
        lastPoint = null;
        isDrawing = false;
        saveToHistory();
        render();
      }
    }

    // 事件绑定
    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => loadImage(img, file.name);
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('canvas-container').addEventListener('dragover', (e) => e.preventDefault());
    document.getElementById('canvas-container').addEventListener('drop', (e) => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => loadImage(img, file.name);
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    displayCanvas.addEventListener('mousedown', handlePointerDown);
    displayCanvas.addEventListener('mousemove', handlePointerMove);
    displayCanvas.addEventListener('mouseup', handlePointerUp);
    displayCanvas.addEventListener('mouseleave', handlePointerUp);
    displayCanvas.addEventListener('mouseenter', () => brushCursor.style.display = 'block');
    displayCanvas.addEventListener('mouseleave', () => brushCursor.style.display = 'none');

    // 类型按钮
    document.querySelectorAll('.type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mosaicType = btn.dataset.type;
      });
    });

    // 滑块
    document.getElementById('intensity').addEventListener('input', (e) => {
      intensity = parseFloat(e.target.value);
      document.getElementById('intensity-value').textContent = Math.round(intensity * 100) + '%';
    });

    document.getElementById('brush-size').addEventListener('input', (e) => {
      brushSize = parseInt(e.target.value);
      document.getElementById('brush-size-value').textContent = brushSize + 'px';
      updateBrushPreview();
    });

    document.getElementById('hardness').addEventListener('input', (e) => {
      hardness = parseFloat(e.target.value);
      document.getElementById('hardness-value').textContent = Math.round(hardness * 100) + '%';
      updateBrushPreview();
    });

    document.getElementById('opacity').addEventListener('input', (e) => {
      opacity = parseFloat(e.target.value);
      document.getElementById('opacity-value').textContent = Math.round(opacity * 100) + '%';
      updateBrushPreview();
    });

    function updateBrushPreview() {
      const size = Math.min(brushSize, 70);
      brushPreview.style.width = size + 'px';
      brushPreview.style.height = size + 'px';
      brushPreview.style.opacity = opacity;
      brushPreview.style.filter = `blur(${(1 - hardness) * brushSize * 0.15}px)`;
    }

    // 按钮
    document.getElementById('btn-undo').addEventListener('click', () => {
      if (historyIndex > 0) restoreFromHistory(historyIndex - 1);
    });

    document.getElementById('btn-redo').addEventListener('click', () => {
      if (historyIndex < history.length - 1) restoreFromHistory(historyIndex + 1);
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      const ctx = processedCanvas.getContext('2d');
      ctx.clearRect(0, 0, processedCanvas.width, processedCanvas.height);
      ctx.drawImage(originalCanvas, 0, 0);
      maskCanvas.getContext('2d').clearRect(0, 0, maskCanvas.width, maskCanvas.height);
      saveToHistory();
      render();
    });

    document.getElementById('btn-close').addEventListener('click', () => {
      imageLoaded = false;
      imageName = '';
      history = [];
      historyIndex = -1;
      updateUndoRedoButtons();
      lastPoint = null;

      uploadZone.style.display = 'flex';
      displayCanvas.style.display = 'none';
      settingsPanel.style.display = 'none';
      brushCursor.style.display = 'none';
    });

    document.getElementById('btn-export').addEventListener('click', () => {
      displayCanvas.toBlob((blob) => {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const baseName = imageName.replace(/\.[^.]+$/, '');
        a.download = `${baseName}_mosaic.png`;
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    });

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        if (e.shiftKey) {
          if (historyIndex < history.length - 1) restoreFromHistory(historyIndex + 1);
        } else {
          if (historyIndex > 0) restoreFromHistory(historyIndex - 1);
        }
      }
    });

    // 窗口 resize
    window.addEventListener('resize', updateCanvasScale);

    // 初始化画笔预览
    updateBrushPreview();
  </script>
</body>
</html>
